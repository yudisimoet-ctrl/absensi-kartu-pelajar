# Render deploy config
# Free tier: web service, auto HTTPS, SQLite di ephemeral disk.
# Catatan: disk free tier di-reset tiap deploy — buat produksi ganti ke
# PostgreSQL add-on atau External (mounted) disk.
services:
  - type: web
    name: absensi-kartu-pelajar
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /
    envVars:
      - key: RENDER
        value: "true"
      - key: PORT
        sync: false
      - key: SHEETS_WEBHOOK
        sync: false
