<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Scanner Absensi</title>
<script src="/static/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Arial;background:#0f172a;color:#e2e8f0;margin:0;padding:16px;max-width:480px;margin:0 auto}
  h2{margin:4px 0 14px;font-size:20px;font-weight:700}
  .card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .label{font-size:12px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .jenis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .jenis button{padding:14px 0;border:0;border-radius:10px;background:#0f172a;color:#94a3b8;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .jenis button.aktif{background:#2563eb;color:#fff;box-shadow:0 0 0 2px #3b82f6}
  .ctrls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  select,input[type=text]{flex:1;min-width:120px;padding:12px;border-radius:10px;border:0;background:#0f172a;color:#e2e8f0;font-size:15px}
  button.act{padding:12px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  button.act.alt{background:#0f172a;color:#94a3b8}
  button.act.green{background:#16a34a}
  #reader{width:100%;border-radius:12px;overflow:hidden;min-height:50px;background:#0f172a}
  #reader video{width:100%!important;border-radius:12px}
  #hasil{font-size:18px;font-weight:600;text-align:center;padding:18px 10px;border-radius:12px;background:#0f172a;min-height:24px;line-height:1.4}
  .ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}
  .hint{font-size:13px;color:#94a3b8;line-height:1.5}
  .divider{height:1px;background:#0f172a;margin:14px 0}
  .nav{display:flex;justify-content:center;gap:18px;margin-top:18px;font-size:14px}
  .nav a{color:#60a5fa;text-decoration:none}
  input[type=file]{font-size:13px;color:#94a3b8;width:100%}
</style>
</head>
<body>
<h2>📷 Scanner Absensi</h2>

<div class="card">
  <div class="label">1 · Pilih Jenis Absen</div>
  <div class="jenis">
    <button data-j="harian" class="aktif">Harian</button>
    <button data-j="solat">Solat</button>
    <button data-j="perpus">Perpus</button>
  </div>
</div>

<div class="card">
  <div class="label">2 · Nyalakan Kamera</div>
  <div class="ctrls">
    <button class="act green" onclick="mintaIzin()">Izin Kamera</button>
    <select id="cam"><option value="">— pilih kamera —</option></select>
  </div>
  <div class="ctrls">
    <button class="act" onclick="startCam()">▶ Mulai</button>
    <button class="act alt" onclick="stopCam()">■ Stop</button>
  </div>
  <div id="reader"></div>
</div>

<div class="card">
  <div id="hasil">Pilih jenis, lalu tap <b>Izin Kamera</b> → <b>Mulai</b>.</div>
</div>

<div class="card">
  <div class="label">Alternatif (kamera mati)</div>
  <div class="hint" style="margin-bottom:8px">• Upload foto kartu:</div>
  <input type="file" id="upfile" accept="image/*" onchange="scanFile()">
  <div class="divider"></div>
  <div class="hint" style="margin-bottom:8px">• Atau ketik NISN / kode kartu:</div>
  <div class="ctrls">
    <input id="manual" type="text" placeholder="misal 9876543210" inputmode="numeric">
    <button class="act" onclick="submitManual()">Catat</button>
  </div>
</div>

<div class="nav"><a href="/admin">Admin</a><a href="/">Home</a></div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
<script>
const out=document.getElementById('hasil');
const warn=document.getElementById('warn');
const libOk=(typeof Html5Qrcode!=='undefined');
if(!libOk){ out.innerHTML='<span class="err">Library scanner gagal load. Refresh halaman.</span>'; }
const secure=(location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1');
if(!secure){ out.innerHTML='<span class="warn">⚠ Buka lewat https supaya kamera aktif.</span>'; }

async function mintaIzin(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    out.innerHTML='<span class="ok">Izin kamera OK ✔ Pilih kamera lalu Mulai.</span>';
    listCams();
  }catch(e){
    out.innerHTML='<span class="err">Izin ditolak ('+e.name+'). Cek ikon 🔒 di address bar → Kamera=Allow, lalu refresh.</span>';
  }
}
</script>
<script>
let jenis="harian";
document.querySelectorAll('.jenis button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.jenis button').forEach(x=>x.classList.remove('aktif'));
    b.classList.add('aktif'); jenis=b.dataset.j;
  };
});
if(!libOk){ /* stop */ } else { var scanner=new Html5Qrcode("reader"); }
let running=false;

async function listCams(){
  if(!libOk) return;
  try{
    const cams=await Html5Qrcode.getCameras();
    const sel=document.getElementById('cam');
    sel.innerHTML='<option value="">— pilih kamera —</option>';
    if(cams&&cams.length){ cams.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.label||c.id;sel.appendChild(o);}); }
    else { out.innerHTML='<span class="warn">Tidak ada kamera terdeteksi.</span>'; }
  }catch(e){ out.innerHTML='<span class="warn">Gagal list kamera: '+e+'</span>'; }
}

async function startCam(){
  if(!libOk){ out.innerHTML='<span class="err">Library belum load. Refresh.</span>'; return; }
  if(running) await stopCam();
  const camId=document.getElementById('cam').value;
  const config={fps:10,qrbox:260};
  const devId=camId||{facingMode:"environment"};
  out.innerHTML='<span class="ok">Menyalakan kamera…</span>';
  try{ await scanner.start(devId,config,onScan,()=>{}); running=true; }
  catch(e){
    const m=String(e);
    if(m.includes('NotAllowed')||m.includes('Permission')){
      out.innerHTML='<span class="err">Izin kamera ditolak. Ketuk 🔒 di address bar → Kamera=Allow → refresh.</span>';
    } else {
      try{ await scanner.start({facingMode:"user"},config,onScan,()=>{}); running=true; }
      catch(e2){ out.innerHTML='<span class="err">Kamera gagal: '+e2+'</span>'; }
    }
  }
}
async function stopCam(){ if(running){ try{await scanner.stop();}catch(e){} running=false; } }

let lastScan=0;
function beep(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.value=880; g.gain.value=0.1;
    o.start(); setTimeout(()=>o.stop(),120);
  }catch(e){}
}
async function onScan(decoded){
  const now=Date.now();
  if(now-lastScan<1500) return;   // debounce 1.5dtk (anti double)
  lastScan=now;
  out.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode:decoded,jenis})});
    const d=await r.json();
    if(d.ok){ beep();
      const foto = d.foto ? `<img src="${d.foto}" style="width:54px;height:54px;border-radius:10px;object-fit:cover;vertical-align:middle;margin-right:10px">` : '👤 ';
      out.innerHTML=`<span class="ok" style="display:flex;align-items:center;justify-content:center">${foto}<span style="text-align:left"><b>${d.nama}</b><br><span style="font-size:13px;font-weight:400">${d.nisn||'-'} · ${d.kelas||'-'}<br>${d.jenis} · ${d.waktu}</span></span></span><br><span style="font-size:13px;color:#94a3b8">← scan berikutnya</span>`;
    }
    else if(d.sudah){ out.innerHTML=`<span class="warn">↺ ${d.nama} sudah absen ${d.jenis} hari ini</span>`; }
    else { out.innerHTML=`<span class="err">✘ ${d.msg}</span>`; }
  }catch(e){ out.innerHTML='<span class="err">✘ '+e+'</span>'; }
  // TIDAK pause → kamera tetap jalan, scan terus tanpa putus
}

async function scanFile(){
  const f=document.getElementById('upfile').files[0];
  if(!f) return;
  out.innerHTML='<span class="ok">Membaca gambar…</span>';
  try{ const res=await scanner.scanFile(f,true); await onScan(res); }
  catch(e){ out.innerHTML='<span class="err">Gagal baca gambar: '+e+'</span>'; }
}

async function submitManual(){
  const v=document.getElementById('manual').value.trim();
  if(!v){ alert('ketik NISN atau kode kartu'); return; }
  let kode=v.toUpperCase();
  if(/^\d+$/.test(v)) kode='ABS-'+v;
  out.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode,jenis})});
    const d=await r.json();
    if(d.ok){ out.innerHTML=`<span class="ok">✔ ${d.nama}<br>(${d.kelas||'-'}) · ${d.jenis}<br>${d.waktu}</span>`; document.getElementById('manual').value=''; }
    else { out.innerHTML=`<span class="err">✘ ${d.msg}</span>`; }
  }catch(e){ out.innerHTML='<span class="err">✘ '+e+'</span>'; }
}
</script>
</body>
</html>
