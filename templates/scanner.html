<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Scanner Absensi — Guru</title>
<script src="/static/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Arial;background:#0f172a;color:#e2e8f0;margin:0;padding:16px;max-width:480px;margin:0 auto}
  h2{margin:4px 0 14px;font-size:20px;font-weight:700}
  .card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .label{font-size:12px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .jenis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .jenis button{padding:14px 0;border:0;border-radius:10px;background:#0f172a;color:#94a3b8;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
  .jenis button.aktif{color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.15)}
  .jenis button[data-j="harian"].aktif{background:#2563eb;box-shadow:0 0 0 2px #60a5fa}
  .jenis button[data-j="solat"].aktif{background:#16a34a;box-shadow:0 0 0 2px #4ade80}
  .jenis button[data-j="perpus"].aktif{background:#d97706;box-shadow:0 0 0 2px #fbbf24}
  .ctrls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  select,input[type=text]{flex:1;min-width:120px;padding:12px;border-radius:10px;border:0;background:#0f172a;color:#e2e8f0;font-size:15px}
  button.act{padding:12px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  button.act.alt{background:#0f172a;color:#94a3b8}
  button.act.green{background:#16a34a}
  input[type=file]{font-size:13px;color:#94a3b8;width:100%}

  /* Kamera + overlay hasil menimpa kamera */
  .cam-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:280px}
  #reader{width:100%}
  #reader video{width:100%!important;border-radius:12px}
  #overlay{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;
    padding:14px;background:linear-gradient(to top,rgba(15,23,42,.92) 0%,rgba(15,23,42,.55) 45%,rgba(15,23,42,0) 100%)}
  #overlay .row{display:flex;align-items:center;gap:12px}
  #overlay .pic{width:64px;height:64px;border-radius:12px;object-fit:cover;flex:0 0 auto;background:#334155}
  #overlay .nm{font-size:19px;font-weight:700;line-height:1.2}
  #overlay .sub{font-size:13px;color:#cbd5e1;margin-top:2px}
  #overlay .tag{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;padding:4px 10px;border-radius:999px}
  #overlay.ok .tag{background:#16a34a;color:#fff}
  #overlay.warn .tag{background:#d97706;color:#fff}
  #overlay.err .tag{background:#dc2626;color:#fff}
  #overlay .next{font-size:12px;color:#94a3b8;margin-top:6px}

  .status{font-size:15px;font-weight:600;padding:14px;border-radius:12px;background:#0f172a;min-height:22px;line-height:1.4;text-align:center}
  .status.ok{color:#4ade80}.status.err{color:#f87171}.status.warn{color:#fbbf24}
  .hint{font-size:13px;color:#94a3b8;line-height:1.5}
  .divider{height:1px;background:#0f172a;margin:14px 0}
  .badge{display:inline-block;font-size:12px;color:#94a3b8;background:#0f172a;padding:4px 10px;border-radius:8px}
</style>
</head>
<body>
<h2>📷 Scanner Absensi</h2>
<span class="badge">Untuk Guru</span>

<div class="card">
  <div class="label">1 · Pilih Jenis Absen</div>
  <div class="jenis">
    <button data-j="harian" class="aktif">Harian</button>
    <button data-j="solat">Solat</button>
    <button data-j="perpus">Perpus</button>
  </div>
</div>

<div class="card">
  <div class="label">2 · Kamera</div>
  <div class="ctrls">
    <button class="act green" onclick="mintaIzin()">Izin Kamera</button>
    <button class="act" onclick="startCam()">▶ Mulai</button>
    <button class="act alt" onclick="stopCam()">■ Stop</button>
  </div>
  <div class="cam-wrap">
    <div id="reader"></div>
    <div id="overlay"><div class="row">
      <img class="pic" id="o-pic" src="" alt="">
      <div>
        <div class="nm" id="o-nm">—</div>
        <div class="sub" id="o-sub"></div>
        <span class="tag" id="o-tag"></span>
        <div class="next">← arahkan ke kartu berikutnya</div>
      </div>
    </div></div>
  </div>
</div>

<div id="status" class="status">Pilih jenis, lalu tap <b>Izin Kamera</b> → <b>Mulai</b>.</div>

<div class="card">
  <div class="label">Alternatif (kamera mati)</div>
  <div class="hint" style="margin-bottom:8px">• Upload foto kartu:</div>
  <input type="file" id="upfile" accept="image/*" onchange="scanFile()">
  <div class="divider"></div>
  <div class="hint" style="margin-bottom:8px">• Atau ketik NISN / kode kartu:</div>
  <div class="ctrls">
    <input id="manual" type="text" placeholder="misal 9876543210" inputmode="numeric">
    <button class="act" onclick="submitManual()">Catat</button>
  </div>
</div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
<script>
const statusEl=document.getElementById('status');
const ov=document.getElementById('overlay');
const libOk=(typeof Html5Qrcode!=='undefined');
if(!libOk){ statusEl.innerHTML='<span class="err">Library scanner gagal load. Refresh halaman.</span>'; }
const secure=(location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1');
if(!secure){ statusEl.innerHTML='<span class="warn">⚠ Buka lewat https supaya kamera aktif.</span>'; }

function showOverlay(d,kind){
  ov.className='';
  ov.classList.add(kind);
  ov.style.display='flex';
  const pic=document.getElementById('o-pic');
  if(d.foto){ pic.src=d.foto; pic.style.display='block'; }
  else { pic.removeAttribute('src'); pic.style.display='none'; }
  document.getElementById('o-nm').textContent=d.nama||'—';
  document.getElementById('o-sub').textContent=
    [d.nisn||'-', d.kelas||'-', d.jenis?('absen '+d.jenis):''].filter(Boolean).join(' · ');
  const tag=document.getElementById('o-tag');
  if(kind==='ok'){ tag.textContent='✔ Tercatat '+(d.waktu||''); }
  else if(kind==='warn'){ tag.textContent='↺ '+d.msg; }
  else { tag.textContent='✘ '+d.msg; }
}

async function mintaIzin(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    statusEl.innerHTML='<span class="ok">Izin kamera OK ✔ Tap Mulai.</span>';
  }catch(e){
    statusEl.innerHTML='<span class="err">Izin ditolak ('+e.name+'). Cek ikon 🔒 di address bar → Kamera=Allow, lalu refresh.</span>';
  }
}
</script>
<script>
let jenis="harian";
document.querySelectorAll('.jenis button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.jenis button').forEach(x=>x.classList.remove('aktif'));
    b.classList.add('aktif'); jenis=b.dataset.j;
  };
});
if(!libOk){ /* stop */ } else { var scanner=new Html5Qrcode("reader"); }
let running=false;

async function startCam(){
  if(!libOk){ statusEl.innerHTML='<span class="err">Library belum load. Refresh.</span>'; return; }
  if(running) await stopCam();
  const config={fps:10,qrbox:260};
  const devId={facingMode:"environment"};   // langsung kamera belakang
  statusEl.innerHTML='<span class="ok">Menyalakan kamera…</span>';
  try{ await scanner.start(devId,config,onScan,()=>{}); running=true; }
  catch(e){
    const m=String(e);
    if(m.includes('NotAllowed')||m.includes('Permission')){
      statusEl.innerHTML='<span class="err">Izin kamera ditolak. Ketuk 🔒 di address bar → Kamera=Allow → refresh.</span>';
    } else {
      try{ await scanner.start({facingMode:"user"},config,onScan,()=>{}); running=true; }
      catch(e2){ statusEl.innerHTML='<span class="err">Kamera gagal: '+e2+'</span>'; }
    }
  }
}
async function stopCam(){ if(running){ try{await scanner.stop();}catch(e){} running=false; } }

let lastScan=0;
function beep(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.value=880; g.gain.value=0.1;
    o.start(); setTimeout(()=>o.stop(),120);
  }catch(e){}
}
async function onScan(decoded){
  const now=Date.now();
  if(now-lastScan<1500) return;   // debounce 1.5dtk (anti double)
  lastScan=now;
  statusEl.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode:decoded,jenis})});
    const d=await r.json();
    if(d.ok){ beep(); showOverlay(d,'ok'); statusEl.innerHTML='<span class="ok">✔ Tercatat. Arahkan ke kartu berikutnya.</span>'; }
    else if(d.sudah){ showOverlay(d,'warn'); statusEl.innerHTML='<span class="warn">↺ Sudah absen.</span>'; }
    else { showOverlay(d,'err'); statusEl.innerHTML='<span class="err">✘ '+d.msg+'</span>'; }
  }catch(e){ statusEl.innerHTML='<span class="err">✘ '+e+'</span>'; }
  // TIDAK pause → kamera tetap jalan, scan terus tanpa putus
}

async function scanFile(){
  const f=document.getElementById('upfile').files[0];
  if(!f) return;
  statusEl.innerHTML='<span class="ok">Membaca gambar…</span>';
  try{ const res=await scanner.scanFile(f,true); await onScan(res); }
  catch(e){ statusEl.innerHTML='<span class="err">Gagal baca gambar: '+e+'</span>'; }
}

async function submitManual(){
  const v=document.getElementById('manual').value.trim();
  if(!v){ alert('ketik NISN atau kode kartu'); return; }
  let kode=v.toUpperCase();
  if(/^\d+$/.test(v)) kode='ABS-'+v;
  statusEl.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode,jenis})});
    const d=await r.json();
    if(d.ok){ showOverlay(d,'ok'); statusEl.innerHTML='<span class="ok">✔ Tercatat.</span>'; document.getElementById('manual').value=''; }
    else if(d.sudah){ showOverlay(d,'warn'); statusEl.innerHTML='<span class="warn">↺ Sudah absen.</span>'; }
    else { showOverlay(d,'err'); statusEl.innerHTML='<span class="err">✘ '+d.msg+'</span>'; }
  }catch(e){ statusEl.innerHTML='<span class="err">✘ '+e+'</span>'; }
}
</script>
</body>
</html>
