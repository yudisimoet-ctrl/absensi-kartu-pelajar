<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner Absensi</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
<style>
  body{font-family:system-ui,Arial;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}
  h2{margin:8px 0}
  #reader{width:100%;max-width:420px;border-radius:12px;overflow:hidden;min-height:60px}
  .jenis{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
  .jenis button{padding:12px 16px;border:0;border-radius:10px;background:#1e293b;color:#e2e8f0;font-size:15px;flex:1}
  .jenis button.aktif{background:#2563eb;color:#fff;font-weight:bold}
  #hasil{margin-top:14px;padding:14px;border-radius:10px;background:#1e293b;min-height:20px;font-size:16px}
  .ok{color:#4ade80}.err{color:#f87171}.warn{color:#fbbf24}
  .ctrls{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center}
  select,button.act{padding:10px;border-radius:8px;border:0;font-size:14px;background:#1e293b;color:#fff}
  button.act{background:#2563eb;cursor:pointer}
  .nav{margin-top:18px;font-size:13px}.nav a{color:#60a5fa}
</style>
</head>
<body>
<h2>Scanner Absensi</h2>
<div class="jenis">
  <button data-j="harian" class="aktif">Harian</button>
  <button data-j="solat">Solat</button>
  <button data-j="perpus">Perpus</button>
</div>

<div id="warn" class="warn" style="display:none"></div>

<div class="ctrls">
  <select id="cam"><option value="">— pilih kamera —</option></select>
  <button class="act" onclick="startCam()">Mulai Kamera</button>
  <button class="act" onclick="stopCam()">Stop</button>
</div>

<div id="reader"></div>

<div class="ctrls">
  <label class="warn">Atau upload foto kartu (kalau kamera blokir):</label>
  <input type="file" id="upfile" accept="image/*" onchange="scanFile()">
</div>

<div class="ctrls" style="border-top:1px solid #1e293b;padding-top:10px">
  <label class="warn">Kamera mati? Input manual (ketik NISN / kode kartu):</label>
  <input id="manual" placeholder="misal 9876543210 atau ABS-9876543210" style="flex:2">
  <button class="act" onclick="submitManual()">Catat</button>
</div>

<div id="hasil">Pilih jenis, lalu Mulai Kamera / arahkan ke barcode-QR siswa.</div>
<div class="nav"><a href="/admin">Admin</a> · <a href="/">Home</a></div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>

<script>
let jenis="harian";
document.querySelectorAll('.jenis button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.jenis button').forEach(x=>x.classList.remove('aktif'));
    b.classList.add('aktif'); jenis=b.dataset.j;
  };
});
const out=document.getElementById('hasil');
const warn=document.getElementById('warn');
const scanner=new Html5Qrcode("reader");
let running=false;

// Peringatan kalau bukan HTTPS (kamera di HP butuh secure context)
if(location.protocol!=='https:' && location.hostname!=='localhost' && location.hostname!=='127.0.0.1'){
  warn.style.display='block';
  warn.innerHTML='⚠ Buka lewat <b>https</b> (bukan http) supaya kamera di HP aktif. URL sekarang: '+location.href;
}

async function listCams(){
  try{
    const cams=await Html5Qrcode.getCameras();
    const sel=document.getElementById('cam');
    sel.innerHTML='<option value="">— pilih kamera —</option>';
    if(cams && cams.length){
      cams.forEach(c=>{
        const o=document.createElement('option');
        o.value=c.id; o.textContent=c.label||c.id; sel.appendChild(o);
      });
    } else { warn.style.display='block'; warn.innerHTML+='<br>Tidak ada kamera terdeteksi.'; }
  }catch(e){ warn.style.display='block'; warn.innerHTML='Gagal list kamera: '+e; }
}
listCams();

async function startCam(){
  if(running) await stopCam();
  const camId=document.getElementById('cam').value;
  const config={fps:10,qrbox:260};
  const devId = camId || {facingMode:"environment"};
  out.innerHTML='<span class="ok">Menyalakan kamera…</span>';
  try{
    await scanner.start(devId, config, onScan, ()=>{});
    running=true;
  }catch(e){
    const msg=String(e);
    if(msg.includes('NotAllowed') || msg.includes('Permission')){
      out.innerHTML='<span class="err">Izin kamera ditolak. Cara reset di Chrome HP: ketuk ikon 🔒 di address bar → Izin Situs → Kamera → pilih "Izinkan", lalu refresh. Atau pakai input manual di bawah.</span>';
    } else {
      try{ await scanner.start({facingMode:"user"}, config, onScan, ()=>{}); running=true; }
      catch(e2){ out.innerHTML='<span class="err">Kamera gagal: '+e2+'</span>'; }
    }
  }
}
async function stopCam(){ if(running){ try{await scanner.stop();}catch(e){} running=false; } }

async function submitManual(){
  const v=document.getElementById('manual').value.trim();
  if(!v){ alert('ketik NISN atau kode kartu'); return; }
  // normalisasi: kalau cuma angka, ubah jadi ABS-xxx
  let kode=v.toUpperCase();
  if(/^\d+$/.test(v)) kode='ABS-'+v;
  out.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kode,jenis})});
    const d=await r.json();
    if(d.ok){out.innerHTML=`<span class="ok">✔ ${d.nama} (${d.kelas||'-'}) · ${d.jenis} · ${d.waktu}</span>`; document.getElementById('manual').value='';}
    else{out.innerHTML=`<span class="err">✘ ${d.msg}</span>`;}
  }catch(e){out.innerHTML=`<span class="err">✘ ${e}</span>`;}
}

async function onScan(decoded){
  if(running){ await scanner.pause(); }
  out.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kode:decoded,jenis})});
    const d=await r.json();
    if(d.ok){out.innerHTML=`<span class="ok">✔ ${d.nama} (${d.kelas||'-'}) · ${d.jenis} · ${d.waktu}</span>`;}
    else{out.innerHTML=`<span class="err">✘ ${d.msg}</span>`;}
  }catch(e){out.innerHTML=`<span class="err">✘ ${e}</span>`;}
  setTimeout(()=>{ if(running) scanner.resume(); },900);
}

async function scanFile(){
  const f=document.getElementById('upfile').files[0];
  if(!f) return;
  out.innerHTML='<span class="ok">Membaca gambar…</span>';
  try{
    const res=await scanner.scanFile(f,true);
    await onScan(res);
  }catch(e){ out.innerHTML='<span class="err">Gagal baca gambar: '+e+'</span>'; }
}
</script>
</body>
</html>
