<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Scanner Absensi</title>
<link rel="manifest" href="/manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/static/html5-qrcode.min.js"></script>
<style>
  :root{--navy:#0f172a;--slate:#1e293b;--slate2:#334155;--muted:#94a3b8;--light:#cbd5e1;--white:#f8fafc;--accent:#059669;--accent-hover:#047857;--accent-light:rgba(5,150,105,.12);--blue:#2563eb;--blue-hover:#1d4ed8;--orange:#d97706;--orange-light:rgba(217,119,6,.12);--danger:#dc2626;--danger-light:rgba(220,38,38,.12);--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.2)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--navy);color:var(--light);min-height:100vh;min-height:100dvh}
  .layout{max-width:480px;margin:0 auto;padding:16px 16px 32px}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px}
  .header h1{font-size:18px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px}
  .guru-badge{font-size:12px;color:var(--light);background:var(--slate);padding:6px 12px;border-radius:20px;border:1px solid var(--slate2);display:flex;align-items:center;gap:6px}
  .guru-badge .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .btn-logout{font-size:11px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px;border:1px solid var(--slate2);transition:all .2s}
  .btn-logout:hover{color:var(--white);border-color:var(--muted)}

  /* Cards */
  .card{background:var(--slate);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.04)}
  .card-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

  /* Jenis buttons */
  .jenis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .jenis button{padding:14px 0;border:0;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;color:#fff;opacity:.45;position:relative}
  .jenis button[data-j="harian"]{background:var(--blue)}
  .jenis button[data-j="solat"]{background:var(--accent)}
  .jenis button[data-j="perpus"]{background:var(--orange)}
  .jenis button.aktif{opacity:1;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .jenis button[data-j="harian"].aktif{box-shadow:0 0 0 2px rgba(96,165,250,.6),0 4px 12px rgba(37,99,235,.3)}
  .jenis button[data-j="solat"].aktif{box-shadow:0 0 0 2px rgba(74,222,128,.6),0 4px 12px rgba(5,150,105,.3)}
  .jenis button[data-j="perpus"].aktif{box-shadow:0 0 0 2px rgba(251,191,36,.6),0 4px 12px rgba(217,119,6,.3)}

  /* Camera */
  .cam-controls{display:flex;gap:6px;margin-bottom:10px}
  .btn{padding:10px 14px;border:0;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;flex:1;text-align:center}
  .btn:active{transform:scale(.97)}
  .btn-green{background:var(--accent);color:#fff}.btn-green:hover{background:var(--accent-hover)}
  .btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-hover)}
  .btn-ghost{background:var(--navy);color:var(--muted);border:1px solid var(--slate2)}.btn-ghost:hover{color:var(--white)}

  .cam-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:280px}
  #reader{width:100%}
  #reader video{width:100%!important;border-radius:14px}

  /* Overlay */
  #overlay{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;padding:16px;border-radius:14px}
  #overlay .row{display:flex;align-items:center;gap:14px}
  #overlay .pic{width:56px;height:56px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--slate2)}
  #overlay .nm{font-size:17px;font-weight:700;color:var(--white);line-height:1.2}
  #overlay .sub{font-size:12px;color:var(--light);margin-top:2px}
  #overlay .tag{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
  #overlay.ok{background:linear-gradient(to top,rgba(5,150,105,.9) 0%,rgba(5,150,105,.6) 40%,transparent 100%)}
  #overlay.ok .tag{background:rgba(255,255,255,.2);color:#fff}
  #overlay.warn{background:linear-gradient(to top,rgba(217,119,6,.9) 0%,rgba(217,119,6,.6) 40%,transparent 100%)}
  #overlay.warn .tag{background:rgba(255,255,255,.2);color:#fff}
  #overlay.err{background:linear-gradient(to top,rgba(220,38,38,.9) 0%,rgba(220,38,38,.6) 40%,transparent 100%)}
  #overlay.err .tag{background:rgba(255,255,255,.2);color:#fff}
  #overlay .next{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}

  /* Status */
  .status{font-size:13px;font-weight:500;padding:14px;border-radius:12px;background:var(--navy);min-height:20px;line-height:1.4;text-align:center;border:1px solid var(--slate2)}
  .status.ok{color:#4ade80;border-color:rgba(5,150,105,.3)}.status.err{color:#f87171;border-color:rgba(220,38,38,.3)}.status.warn{color:#fbbf24;border-color:rgba(234,179,8,.3)}

  /* Alternatif */
  .alt-section{font-size:12px;color:var(--muted);margin-bottom:6px}
  .input-row{display:flex;gap:8px}
  .input-row input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--slate2);background:var(--navy);color:var(--white);font-family:inherit;font-size:13px}
  .input-row input:focus{outline:none;border-color:var(--accent)}

  @media(max-width:360px){
    .jenis button{font-size:12px;padding:12px 0}
  }
</style>
</head>
<body>
<div class="layout">

<!-- Header -->
<div class="header">
  <h1>📷 Scanner</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="guru-badge"><span class="dot"></span> {{ session.get('guru_nama', 'Guru') }}</div>
    <a href="/scanner/logout" class="btn-logout">Keluar</a>
  </div>
</div>

<!-- Jenis Absen -->
<div class="card">
  <div class="card-label">① Pilih Jenis Absen</div>
  <div class="jenis">
    <button data-j="harian" class="aktif">Harian</button>
    <button data-j="solat">Solat</button>
    <button data-j="perpus">Perpus</button>
  </div>
</div>

<!-- Kamera -->
<div class="card">
  <div class="card-label">② Scan Kartu</div>
  <div class="cam-controls">
    <button class="btn btn-green" onclick="mintaIzin()">Izin Kamera</button>
    <button class="btn btn-blue" onclick="startCam()">▶ Mulai</button>
    <button class="btn btn-ghost" onclick="stopCam()">■ Stop</button>
  </div>
  <div class="cam-wrap">
    <div id="reader"></div>
    <div id="overlay"><div class="row">
      <img class="pic" id="o-pic" src="" alt="">
      <div>
        <div class="nm" id="o-nm">—</div>
        <div class="sub" id="o-sub"></div>
        <span class="tag" id="o-tag"></span>
        <div class="next">← Arahkan ke kartu berikutnya</div>
      </div>
    </div></div>
  </div>
</div>

<!-- Status -->
<div id="status" class="status" style="margin-bottom:12px">Pilih jenis, lalu tap <b>Izin Kamera</b> → <b>Mulai</b></div>

<!-- Alternatif -->
<div class="card">
  <div class="card-label">Alternatif</div>
  <div class="alt-section" style="margin-bottom:6px">Upload foto kartu:</div>
  <input type="file" id="upfile" accept="image/*" onchange="scanFile()" style="margin-bottom:12px">
  <div class="alt-section" style="margin-bottom:6px">Atau ketik NISN / kode kartu:</div>
  <div class="input-row">
    <input id="manual" placeholder="misal 9876543210" inputmode="numeric">
    <button class="btn btn-blue" onclick="submitManual()">Catat</button>
  </div>
</div>

</div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
<script>
const statusEl=document.getElementById('status');
const ov=document.getElementById('overlay');
const libOk=(typeof Html5Qrcode!=='undefined');
if(!libOk){ statusEl.innerHTML='<span class="err">Library scanner gagal load. Refresh halaman.</span>'; }
const secure=(location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1');
if(!secure){ statusEl.innerHTML='<span class="warn">⚠ Buka lewat https supaya kamera aktif.</span>'; }

function showOverlay(d,kind){
  ov.className=''; ov.classList.add(kind); ov.style.display='flex';
  const pic=document.getElementById('o-pic');
  if(d.foto){ pic.src=d.foto; pic.style.display='block'; }
  else { pic.removeAttribute('src'); pic.style.display='none'; }
  document.getElementById('o-nm').textContent=d.nama||'—';
  document.getElementById('o-sub').textContent=
    [d.nisn||'-', d.kelas||'-', d.jenis?('absen '+d.jenis):''].filter(Boolean).join(' · ');
  const tag=document.getElementById('o-tag');
  if(kind==='ok'){ tag.textContent='✔ Tercatat '+(d.waktu||''); }
  else if(kind==='warn'){ tag.textContent='↺ '+d.msg; }
  else { tag.textContent='✘ '+d.msg; }
}

async function mintaIzin(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    statusEl.innerHTML='<span class="ok">Izin kamera OK ✔ Tap Mulai.</span>';
  }catch(e){
    statusEl.innerHTML='<span class="err">Izin ditolak ('+e.name+'). Cek ikon 🔒 di address bar → Kamera=Allow, lalu refresh.</span>';
  }
}
</script>
<script>
let jenis="harian";
document.querySelectorAll('.jenis button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.jenis button').forEach(x=>x.classList.remove('aktif'));
    b.classList.add('aktif'); jenis=b.dataset.j;
  };
});
if(!libOk){ /* stop */ } else { var scanner=new Html5Qrcode("reader"); }
let running=false;

async function startCam(){
  if(!libOk){ statusEl.innerHTML='<span class="err">Library belum load. Refresh.</span>'; return; }
  if(running) await stopCam();
  const config={fps:10,qrbox:260};
  const devId={facingMode:"environment"};
  statusEl.innerHTML='<span class="ok">Menyalakan kamera…</span>';
  try{ await scanner.start(devId,config,onScan,()=>{}); running=true; }
  catch(e){
    const m=String(e);
    if(m.includes('NotAllowed')||m.includes('Permission')){
      statusEl.innerHTML='<span class="err">Izin kamera ditolak. Ketuk 🔒 di address bar → Kamera=Allow → refresh.</span>';
    } else {
      try{ await scanner.start({facingMode:"user"},config,onScan,()=>{}); running=true; }
      catch(e2){ statusEl.innerHTML='<span class="err">Kamera gagal: '+e2+'</span>'; }
    }
  }
}
async function stopCam(){ if(running){ try{await scanner.stop();}catch(e){} running=false; } }

let lastScan=0;
function beep(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.value=880; g.gain.value=0.1;
    o.start(); setTimeout(()=>o.stop(),120);
  }catch(e){}
}
async function onScan(decoded){
  const now=Date.now();
  if(now-lastScan<1500) return;
  lastScan=now;
  statusEl.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode:decoded,jenis})});
    const d=await r.json();
    if(d.ok){ beep(); showOverlay(d,'ok'); statusEl.innerHTML='<span class="ok">✔ Tercatat. Arahkan ke kartu berikutnya.</span>'; }
    else if(d.sudah){ showOverlay(d,'warn'); statusEl.innerHTML='<span class="warn">↺ Sudah absen.</span>'; }
    else { showOverlay(d,'err'); statusEl.innerHTML='<span class="err">✘ '+d.msg+'</span>'; }
  }catch(e){ statusEl.innerHTML='<span class="err">✘ '+e+'</span>'; }
}

async function scanFile(){
  const f=document.getElementById('upfile').files[0];
  if(!f) return;
  statusEl.innerHTML='<span class="ok">Membaca gambar…</span>';
  try{ const res=await scanner.scanFile(f,true); await onScan(res); }
  catch(e){ statusEl.innerHTML='<span class="err">Gagal baca gambar: '+e+'</span>'; }
}

async function submitManual(){
  const v=document.getElementById('manual').value.trim();
  if(!v){ alert('Ketik NISN atau kode kartu'); return; }
  let kode=v.toUpperCase();
  if(/^\d+$/.test(v)) kode='ABS-'+v;
  statusEl.innerHTML='<span class="ok">Memproses…</span>';
  try{
    const r=await fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kode,jenis})});
    const d=await r.json();
    if(d.ok){ showOverlay(d,'ok'); statusEl.innerHTML='<span class="ok">✔ Tercatat.</span>'; document.getElementById('manual').value=''; }
    else if(d.sudah){ showOverlay(d,'warn'); statusEl.innerHTML='<span class="warn">↺ Sudah absen.</span>'; }
    else { showOverlay(d,'err'); statusEl.innerHTML='<span class="err">✘ '+d.msg+'</span>'; }
  }catch(e){ statusEl.innerHTML='<span class="err">✘ '+e+'</span>'; }
}
</script>
</body>
</html>
