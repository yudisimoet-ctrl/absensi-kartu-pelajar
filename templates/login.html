<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0f172a;--slate:#1e293b;--slate2:#334155;--muted:#94a3b8;--light:#e2e8f0;--white:#f8fafc;--accent:#059669;--accent-hover:#047857;--danger:#dc2626;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.25)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--navy);color:var(--light);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--slate);border-radius:16px;padding:40px 32px;width:100%;max-width:400px;box-shadow:var(--shadow);border:1px solid var(--slate2)}
  .login-header{text-align:center;margin-bottom:32px}
  .login-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#10b981);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 4px 12px rgba(5,150,105,.3)}
  h1{font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px}
  .subtitle{font-size:13px;color:var(--muted)}
  .form-group{margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  input{width:100%;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--slate2);background:var(--navy);color:var(--white);font-family:inherit;font-size:14px;transition:border-color .2s}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(5,150,105,.15)}
  input::placeholder{color:var(--slate2)}
  .btn{width:100%;padding:13px;border-radius:var(--radius);border:0;background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
  .btn:hover{background:var(--accent-hover)}
  .btn:active{transform:scale(.99)}
  .error{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.25);color:#fca5a5;padding:10px 14px;border-radius:var(--radius);font-size:13px;text-align:center;margin-bottom:16px}
  .footer{text-align:center;margin-top:24px;font-size:12px;color:var(--slate2)}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-icon">⚙️</div>
    <h1>Admin Panel</h1>
    <div class="subtitle">Kelola data siswa dan absensi</div>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input name="username" placeholder="Masukkan username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input name="password" type="password" placeholder="Masukkan password" required>
    </div>
    <button class="btn" type="submit">Masuk</button>
  </form>
  <div class="footer">Sistem Absensi Digital &copy; 2026</div>
</div>
</body>
</html>
