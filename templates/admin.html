<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.webmanifest">
<title>Admin Absensi</title>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Arial;background:#0f172a;color:#e2e8f0;margin:0;padding:16px;max-width:720px;margin:0 auto}
  h2{margin:6px 0 14px;font-size:20px}
  .card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .card h3{margin:0 0 10px;font-size:15px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
  input,button,select{padding:10px;border-radius:8px;border:0;font-size:14px}
  input,select{background:#0f172a;color:#fff;flex:1;min-width:110px}
  button{background:#2563eb;color:#fff;cursor:pointer;font-weight:600}
  button.alt{background:#0f172a;color:#94a3b8}
  button.danger{background:#dc2626}
  .form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .msg{font-size:13px;margin-top:8px;color:#4ade80;min-height:16px}
  .tabs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .tabs button{background:#1e293b}
  .tabs button.aktif{background:#2563eb;font-weight:700}
  .tbl-wrap{max-height:300px;overflow:auto;border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px;border-bottom:1px solid #0f172a;text-align:left;vertical-align:middle}
  th{color:#94a3b8;position:sticky;top:0;background:#1e293b}
  .foto{width:34px;height:34px;border-radius:8px;object-fit:cover;vertical-align:middle}
  a.link{color:#60a5fa;text-decoration:none}
  .nav{display:flex;justify-content:center;gap:18px;margin-top:18px;font-size:14px}
  .nav a{color:#60a5fa;text-decoration:none}
  label.up{color:#60a5fa;cursor:pointer}
</style>
</head>
<body>
<h2>⚙ Admin — Data Siswa</h2>

<div class="card">
  <h3>1 · Tambah Siswa</h3>
  <div class="form">
    <input id="nis" placeholder="NIS">
    <input id="nisn" placeholder="NISN">
    <input id="nama" placeholder="Nama">
    <input id="kelas" placeholder="Kelas">
    <input id="nowa" placeholder="No WA">
    <button onclick="tambah()">+ Tambah</button>
  </div>
</div>

<div class="card">
  <h3>2 · Import / Migrasi</h3>
  <div class="form">
    <input type="file" id="csvfile" accept=".csv">
    <button onclick="uploadCsv()">Upload CSV</button>
    <button class="alt" onclick="migrate()">Migrasi SQL Drive</button>
    <a class="link" href="/api/template.csv" style="align-self:center">template</a>
  </div>
  <div id="m1" class="msg"></div>
</div>

<div class="card">
  <h3>3 · Profil Sekolah</h3>
  <div class="form">
    <input id="p_nama" placeholder="Nama Sekolah">
    <input id="p_alamat" placeholder="Alamat">
    <input id="p_kepsek" placeholder="Kepala Sekolah">
    <input id="p_masuk" placeholder="Jam Masuk (07:00)">
    <input id="p_pulang" placeholder="Jam Pulang (13:00)">
    <button onclick="saveProfil()">Simpan</button>
  </div>
  <div id="m2" class="msg"></div>
</div>

<div class="card">
  <h3>4 · Daftar Siswa</h3>
  <div class="tbl-wrap">
    <table id="tbl">
      <thead><tr><th>Foto</th><th>ID</th><th>NISN</th><th>Nama</th><th>Kelas</th><th>Kode</th><th>Aksi</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="card">
  <h3>5 · Log Absensi (terbaru)</h3>
  <div class="tabs">
    <button class="aktif" onclick="setJenis('all',this)">Semua</button>
    <button onclick="setJenis('harian',this)">Harian</button>
    <button onclick="setJenis('solat',this)">Solat</button>
    <button onclick="setJenis('perpus',this)">Perpus</button>
    <a class="link" href="/api/export/csv" style="align-self:center">⬇ Export CSV</a>
  </div>
  <div class="tbl-wrap">
    <table id="logtbl">
      <thead><tr><th>Waktu</th><th>NISN</th><th>Nama</th><th>Kelas</th><th>Jenis</th><th>Ket</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="nav"><a href="/">Home</a> · <a href="/scanner">Scanner</a> · <a href="#" onclick="installPWA()">Pasang App</a></div>

<script>
let jenisLog='all';
async function loadProfil(){
  const p=await(await fetch('/api/profil')).json();
  p_nama.value=p.nama_sekolah||'';p_alamat.value=p.alamat||'';p_kepsek.value=p.kepala_sekolah||'';
  p_masuk.value=p.jam_masuk||'';p_pulang.value=p.jam_pulang||'';
}
async function saveProfil(){
  const d={nama_sekolah:p_nama.value,alamat:p_alamat.value,kepala_sekolah:p_kepsek.value,jam_masuk:p_masuk.value,jam_pulang:p_pulang.value};
  const r=await fetch('/api/profil',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
  m2.textContent=(await r.json()).ok?'Tersimpan':'Gagal';
}
async function tampil(){
  const s=await(await fetch('/api/siswa')).json();
  document.querySelector('#tbl tbody').innerHTML=s.map(x=>
    `<tr>
      <td>${x.foto?`<img class="foto" src="${x.foto}">`:'👤'}</td>
      <td>${x.id}</td><td>${x.nisn||'-'}</td><td>${x.nama}</td><td>${x.kelas||'-'}</td><td>${x.kode}</td>
      <td>
        <a class="link" href="/kartu/${x.id}" target="_blank">kartu</a> ·
        <label class="up">foto<input type="file" accept="image/*" style="display:none" onchange="upFoto(${x.id},this)"></label> ·
        <a class="link" style="color:#f87171;cursor:pointer" onclick="hapus(${x.id},'${x.nama}')">hapus</a>
      </td>
    </tr>`).join('');
  const url='/api/logs'+(jenisLog!=='all'?('?jenis='+jenisLog):'');
  const l=await(await fetch(url)).json();
  document.querySelector('#logtbl tbody').innerHTML=l.map(x=>
    `<tr><td>${x.waktu}</td><td>${x.nisn||'-'}</td><td>${x.nama}</td><td>${x.kelas||'-'}</td><td>${x.jenis}</td><td>${x.keterangan||''}</td></tr>`).join('');
}
async function tambah(){
  const d={nis:nis.value.trim(),nisn:nisn.value.trim(),nama:nama.value.trim(),kelas:kelas.value.trim(),no_wa:nowa.value.trim()};
  if(!d.nisn||!d.nama){alert('NISN & Nama wajib');return;}
  const r=await fetch('/api/siswa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
  const j=await r.json();
  if(j.ok){nis.value=nisn.value=nama.value=kelas.value=nowa.value='';tampil();}
  else alert(j.msg);
}
async function upFoto(id,input){
  const f=input.files[0]; if(!f)return;
  const fd=new FormData(); fd.append('file',f);
  const r=await fetch('/api/siswa/'+id+'/foto',{method:'POST',body:fd});
  const j=await r.json();
  if(j.ok) tampil(); else alert(j.msg);
}
async function hapus(id,nama){
  if(!confirm('Hapus siswa "'+nama+'"? Data absensinya ikut terhapus.'))return;
  const r=await fetch('/api/siswa/'+id,{method:'DELETE'});
  const j=await r.json();
  m1.textContent=j.ok?('Dihapus: '+nama):(j.msg||'Gagal');
  tampil();
}
async function uploadCsv(){
  const f=csvfile.files[0]; if(!f){alert('pilih CSV');return;}
  const fd=new FormData();fd.append('file',f);
  const r=await fetch('/api/siswa/bulk',{method:'POST',body:fd});
  const j=await r.json();
  m1.textContent=`Import: ${j.added} ditambah, ${j.skipped} dilewati`;
  tampil();
}
async function migrate(){
  if(!confirm('Migrasi siswa + profil dari db-absensi-qr-v5-39-ok.sql? (data lama digabung)'))return;
  const r=await fetch('/api/migrate',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}');
  const j=await r.json();
  m1.textContent=`Migrasi: ${j.siswa} siswa, profil=${j.profil}`;
  loadProfil();tampil();
}
function setJenis(j,el){jenisLog=j;document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('aktif'));el.classList.add('aktif');tampil();}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>deferredPrompt=null);}}
loadProfil();tampil();setInterval(tampil,5000);
</script>
</body>
</html>
